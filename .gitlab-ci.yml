stages:
  - test
  - build
  - gitops

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  API_IMAGE: $CI_REGISTRY_IMAGE/api
  WORKER_IMAGE: $CI_REGISTRY_IMAGE/worker

# MVP placeholder pipeline
api_test:
  stage: test
  image: golang:1.24
  script:
    - cd api-go
    - go test ./...

worker_test:
  stage: test
  image: python:3.12
  script:
    - cd worker-py
    - pip install -r requirements.txt
    - python -m py_compile src/main.py

build_api:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$API_IMAGE:$IMAGE_TAG" -f api-go/Dockerfile api-go
    - docker push "$API_IMAGE:$IMAGE_TAG"
  needs: ["api_test"]

build_worker:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$WORKER_IMAGE:$IMAGE_TAG" -f worker-py/Dockerfile worker-py
    - docker push "$WORKER_IMAGE:$IMAGE_TAG"
  needs: ["worker_test"]

update_gitops_dev_tag:
  stage: gitops
  image: alpine:3.20
  variables:
    GIT_STRATEGY: none
  before_script:
    - apk add --no-cache git sed
    - test -n "$GITOPS_PUSH_TOKEN"
  script:
    - git config --global user.name "incident-monitor-ci"
    - git config --global user.email "incident-monitor-ci@gitlab.com"
    - git clone "https://oauth2:${GITOPS_PUSH_TOKEN}@gitlab.com/sgrudinin/incident-monitor-gitops.git" gitops
    - cd gitops
    - sed -i -E "s|(newTag: ).*|\\1${IMAGE_TAG}|g" apps/incident-monitor/overlays/dev/kustomization.yaml
    - git add apps/incident-monitor/overlays/dev/kustomization.yaml
    - |
      if git diff --cached --quiet; then
        echo "No changes in gitops overlay"
        exit 0
      fi
    - git commit -m "ci: update incident-monitor dev images to ${IMAGE_TAG}"
    - git push origin main
  needs: ["build_api", "build_worker"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
